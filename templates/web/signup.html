<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>CLAUD | Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root{ --bg:#050505; --card:rgba(18,18,22,0.8); --accent:#007aff; --border:rgba(255,255,255,0.08); --text-main:#fff; --text-dim:#a1a1aa; }
        *{ box-sizing:border-box; outline:none; }
        body{ margin:0; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text-main);
            background-image:radial-gradient(circle at 0% 0%,rgba(0,122,255,0.1),transparent 40%),radial-gradient(circle at 100% 100%,rgba(94,92,230,0.1),transparent 40%);
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .signup-box{ background:var(--card); backdrop-filter:blur(20px); padding:32px; border-radius:28px; border:1px solid var(--border); width:100%; max-width:460px; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
        .logo-area{ text-align:center; margin-bottom:24px; }
        .logo-icon{ background:linear-gradient(135deg,#ff0055,#7000ff); width:48px; height:48px; border-radius:14px; display:inline-flex; align-items:center; justify-content:center; color:#fff; margin-bottom:12px; font-size:22px; }
        h2{ margin:0; font-weight:800; letter-spacing:-1px; font-size:22px; }
        p.sub{ color:var(--text-dim); font-size:13px; margin-top:5px; }
        .form-group{ margin-bottom:14px; text-align:left; }
        .form-group label{ display:block; font-size:10px; font-weight:700; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .input-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        input[type="text"],input[type="email"],input[type="password"]{ width:100%; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; color:#fff; font-size:14px; transition:0.3s; font-family:inherit; }
        input:focus{ border-color:var(--accent); background:rgba(255,255,255,0.08); box-shadow:0 0 0 3px rgba(0,122,255,0.2); }
        .file-input-wrapper{ width:100%; }
        .file-btn{ background:rgba(255,255,255,0.05); border:1px dashed var(--border); padding:10px; border-radius:12px; width:100%; color:var(--text-dim); font-size:12px; cursor:pointer; text-align:center; transition:0.3s; }
        .file-btn:hover{ border-color:var(--accent); color:#fff; }
        .btn-signup{ width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),#0051d5); color:#fff; border:none; border-radius:14px; font-weight:800; font-size:15px; margin-top:10px; cursor:pointer; transition:0.3s; box-shadow:0 10px 20px rgba(0,122,255,0.3); font-family:inherit; }
        .btn-signup:hover{ transform:translateY(-2px); box-shadow:0 15px 25px rgba(0,122,255,0.4); }
        .footer-text{ text-align:center; margin-top:18px; font-size:13px; color:var(--text-dim); }
        .footer-text a{ color:var(--accent); text-decoration:none; font-weight:700; }
        .strength-bar{ height:3px; border-radius:3px; margin-top:6px; transition:0.3s; background:#2a2a2e; }
        .strength-fill{ height:100%; border-radius:3px; transition:width 0.3s, background 0.3s; width:0%; }
    </style>
</head>
<body>
<div class="signup-box animate__animated animate__fadeInUp">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <h2>Create Account</h2>
        <p class="sub">Join CLAUD HOSTING</p>
    </div>
    <form id="signupForm" enctype="multipart/form-data">
        <div class="input-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="fname" placeholder="John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lname" placeholder="Doe" required>
            </div>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="johndoe123" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required>
        </div>
        <div class="input-row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="pwdInput" placeholder="••••••••" required oninput="checkStrength(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>
            <div class="form-group">
                <label>Confirm</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
        </div>
        <div class="form-group">
            <label>Profile Picture (Optional)</label>
            <div class="file-input-wrapper">
                <input type="file" name="pfp" id="pfp" style="display:none;" onchange="updateFileName(this)" accept="image/*">
                <div class="file-btn" onclick="document.getElementById('pfp').click()" id="file-label">
                    <i class="fas fa-image"></i> Click to upload photo
                </div>
            </div>
        </div>
        <button type="submit" class="btn-signup">REGISTER NOW</button>
    </form>
    <div class="footer-text">Already have an account? <a href="/login">Login</a></div>
</div>
<script>
function checkStrength(pwd) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const pct = score * 25;
    const colors = ['#ff3b30','#ff9f0a','#34c759','#007aff'];
    fill.style.width = pct + '%';
    fill.style.background = colors[Math.max(score-1,0)];
}
function updateFileName(input) {
    const label = document.getElementById('file-label');
    if (input.files.length > 0) {
        label.innerHTML = `<i class="fas fa-check" style="color:#32d74b"></i> ${input.files[0].name}`;
        label.style.borderColor = '#32d74b';
    }
}
document.getElementById('signupForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating...';
    btn.disabled = true;
    try {
        const response = await fetch('/signup', { method:'POST', body:new FormData(e.target) });
        const result = await response.json();
        if (result.status === 'success') {
            Swal.fire({ title:'Success!', text:'Account created! You have 1 server slot.', icon:'success', background:'#1c1c1e', color:'#fff', confirmButtonColor:'#007aff' }).then(() => window.location.href = result.url);
        } else {
            Swal.fire({ title:'Error', text:result.msg, icon:'error', background:'#1c1c1e', color:'#fff' });
            btn.innerHTML = orig; btn.disabled = false;
        }
    } catch (err) {
        btn.innerHTML = orig; btn.disabled = false;
    }
};
</script>
</body>
</html>
