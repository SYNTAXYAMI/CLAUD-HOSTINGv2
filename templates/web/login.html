<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>CLAUD | ACCESS SECURE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --accent:#007aff; --accent-glow:rgba(0,122,255,0.4); --bg:#000; --card-bg:rgba(28,28,30,0.6); --border:rgba(255,255,255,0.12); --input-bg:rgba(255,255,255,0.06); --text-sec:#8e8e93; }
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body{ background:var(--bg); height:100dvh; display:flex; justify-content:center; align-items:center; overflow:hidden; color:#fff; font-family:'Plus Jakarta Sans',sans-serif; margin:0; position:relative; }
        .mesh-bg{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; }
        .orb{ position:absolute; border-radius:50%; filter:blur(100px); opacity:0.5; animation:move 20s infinite alternate cubic-bezier(0.45,0,0.55,1); }
        .orb-1{ width:500px; height:500px; background:#0047ab; top:-10%; left:-10%; }
        .orb-2{ width:400px; height:400px; background:#007aff; bottom:-5%; right:-5%; animation-delay:-5s; }
        .orb-3{ width:300px; height:300px; background:#5856d6; top:40%; left:30%; animation-duration:25s; }
        @keyframes move{ from{transform:translate(0,0) scale(1);} to{transform:translate(100px,50px) scale(1.2);} }
        .login-card{ width:92%; max-width:420px; background:var(--card-bg); backdrop-filter:blur(30px) saturate(200%); -webkit-backdrop-filter:blur(30px) saturate(200%); border:1px solid var(--border); border-radius:32px; padding:40px 30px; text-align:center; box-shadow:0 40px 80px rgba(0,0,0,0.5); z-index:10; }
        .brand-icon{ width:80px; height:80px; background:linear-gradient(145deg,#1c1c1e,#2c2c2e); border-radius:22px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:35px; color:var(--accent); border:1px solid var(--border); box-shadow:0 10px 25px rgba(0,0,0,0.3); position:relative; }
        .brand-icon::after{ content:''; position:absolute; width:100%; height:100%; border-radius:22px; border:2px solid var(--accent); animation:pulse 3s infinite; }
        @keyframes pulse{ 0%{transform:scale(1);opacity:0.5;} 100%{transform:scale(1.4);opacity:0;} }
        h2{ font-size:30px; font-weight:800; letter-spacing:-1.2px; margin:0 0 8px; }
        .subtitle{ color:var(--text-sec); font-size:15px; margin-bottom:35px; font-weight:500; }
        .input-wrapper{ position:relative; margin-bottom:16px; }
        .input-wrapper i.main-icon{ position:absolute; left:18px; top:50%; transform:translateY(-50%); color:#636366; transition:0.3s; font-size:18px; }
        .input-wrapper input{ width:100%; padding:16px 50px 16px 52px; background:var(--input-bg); border:1px solid transparent; border-radius:16px; color:#fff; font-size:15px; outline:none; transition:all 0.3s; font-weight:500; font-family:inherit; }
        .input-wrapper input:focus{ background:rgba(255,255,255,0.08); border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-glow); }
        .pass-toggle{ position:absolute; right:18px; top:50%; transform:translateY(-50%); color:#636366; cursor:pointer; padding:5px; transition:0.2s; }
        .pass-toggle:hover{ color:#fff; }
        .captcha-box{ background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:16px; padding:14px 18px; margin-bottom:16px; display:none; text-align:left; }
        .captcha-box label{ font-size:12px; color:var(--text-sec); display:block; margin-bottom:8px; }
        .captcha-question{ font-size:18px; font-weight:700; color:#fff; margin-bottom:10px; }
        .captcha-box input{ width:100%; padding:10px 14px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:10px; color:#fff; font-size:15px; outline:none; font-family:inherit; }
        .btn-submit{ width:100%; padding:17px; background:var(--accent); border:none; border-radius:16px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.3s cubic-bezier(0.23,1,0.32,1); display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px; box-shadow:0 10px 20px rgba(0,122,255,0.3); font-family:inherit; }
        .btn-submit:hover{ transform:translateY(-2px); filter:brightness(1.15); box-shadow:0 15px 30px rgba(0,122,255,0.4); }
        .btn-submit:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }
        .footer-link{ margin-top:22px; font-size:13px; color:var(--text-sec); }
        .footer-link a{ color:var(--accent); text-decoration:none; font-weight:700; }
        .swal2-popup.swal2-ios{ background:rgba(30,30,32,0.9) !important; backdrop-filter:blur(25px) !important; border-radius:24px !important; border:1px solid var(--border) !important; color:#fff !important; }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
    </div>
    <div class="login-card animate__animated animate__zoomIn">
        <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h2>NE-HOST</h2>
        <p class="subtitle">Cloud Management &amp; Security</p>
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="input-wrapper">
                <input type="text" name="email" placeholder="Email or Username" required autocomplete="username">
                <i class="fa-solid fa-envelope-open main-icon"></i>
            </div>
            <div class="input-wrapper">
                <input type="password" name="password" id="passInput" placeholder="Password" required autocomplete="current-password">
                <i class="fa-solid fa-key main-icon"></i>
                <i class="fa-solid fa-eye-slash pass-toggle" onclick="togglePassword()"></i>
            </div>
            <div class="captcha-box" id="captchaBox">
                <label><i class="fas fa-robot"></i> Security Verification — Prove you're human</label>
                <div class="captcha-question" id="captchaQuestion"></div>
                <input type="number" name="captcha_answer" id="captchaAnswer" placeholder="Your answer">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span>Secure Sign In</span><i class="fa-solid fa-chevron-right" style="font-size:14px;"></i>
            </button>
        </form>
        <div class="footer-link">New here? <a href="/signup">Create an account</a></div>
    </div>
    <script>
        let captchaNeeded = false;
        async function generateCaptcha() {
            // Fetch server-generated captcha question (expected answer stored server-side in session)
            try {
                const r = await fetch('/captcha/generate');
                const d = await r.json();
                document.getElementById('captchaQuestion').textContent = 'What is ' + d.question + '?';
                document.getElementById('captchaAnswer').value = '';
            } catch(e) {
                document.getElementById('captchaQuestion').textContent = 'Captcha unavailable — refresh page';
            }
        }
        async function showCaptcha() {
            if (!captchaNeeded) {
                captchaNeeded = true;
                document.getElementById('captchaBox').style.display = 'block';
                await generateCaptcha();
            }
        }
        function togglePassword() {
            const input = document.getElementById('passInput');
            const icon = document.querySelector('.pass-toggle');
            if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye-slash','fa-eye'); }
            else { input.type = 'password'; icon.classList.replace('fa-eye','fa-eye-slash'); }
        }
        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i');
            btn.disabled = true; btnText.innerText = 'Verifying...'; btnIcon.className = 'fa-solid fa-circle-notch fa-spin';
            try {
                const formData = new FormData(e.target);
                const response = await fetch('/login', { method:'POST', body:formData });
                const data = await response.json();
                if (response.status === 200) {
                    Swal.fire({ icon:'success', title:'Identity Verified', text:'Redirecting...', timer:1800, showConfirmButton:false, customClass:{popup:'swal2-ios'} });
                    setTimeout(() => window.location.href = data.url, 1700);
                } else if (response.status === 429) {
                    Swal.fire({ icon:'error', title:'Blocked', text:data.msg, customClass:{popup:'swal2-ios'} });
                    reset();
                } else if (response.status === 403) {
                    Swal.fire({ icon:'error', title:'Access Restricted', text:data.msg || 'Account suspended.', customClass:{popup:'swal2-ios'} });
                    reset();
                } else {
                    if (data.needs_captcha) showCaptcha();
                    else Swal.fire({ icon:'warning', title:'Auth Failed', text:data.msg || 'Invalid credentials.', timer:3000, showConfirmButton:false, toast:true, position:'top-end' });
                    // Server pre-generates next captcha question in the response; show it if provided
                    if (data.captcha_question && captchaNeeded) {
                        document.getElementById('captchaQuestion').textContent = 'What is ' + data.captcha_question + '?';
                        document.getElementById('captchaAnswer').value = '';
                    } else if (captchaNeeded) { generateCaptcha(); }
                    reset();
                }
            } catch (err) {
                Swal.fire({ icon:'error', title:'System Error', text:'Unable to reach server.', customClass:{popup:'swal2-ios'} });
                reset();
            }
            function reset() {
                btn.disabled = false; btnText.innerText = 'Secure Sign In'; btnIcon.className = 'fa-solid fa-chevron-right';
            }
        }
    </script>
</body>
</html>
