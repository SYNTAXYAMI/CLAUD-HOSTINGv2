<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>CLAUD | Admin Authority</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
        :root{ --bg:#000; --card:rgba(28,28,30,0.7); --accent:#ff3b30; --blue:#007aff; --green:#34c759; --orange:#ff9f0a; --purple:#af52de; --border:rgba(255,255,255,0.1); --glass:blur(25px) saturate(180%); }
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body{ background:var(--bg); color:#fff; font-family:'Plus Jakarta Sans',sans-serif; margin:0; padding-bottom:60px; }
        .navbar{ background:rgba(0,0,0,0.5); backdrop-filter:var(--glass); border-bottom:0.5px solid var(--border); padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; }
        .nav-logo{ font-weight:800; font-size:18px; display:flex; align-items:center; gap:10px; }
        .nav-logo .badge{ background:rgba(255,59,48,0.15); color:var(--accent); font-size:9px; font-weight:800; padding:3px 7px; border-radius:6px; border:1px solid rgba(255,59,48,0.2); }
        .container{ max-width:820px; margin:auto; padding:20px; }
        .tab-bar{ display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
        .tab-btn{ background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; padding:8px 16px; color:#888; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:0.2s; }
        .tab-btn.active{ background:rgba(0,122,255,0.15); border-color:rgba(0,122,255,0.3); color:var(--blue); }
        .tab-panel{ display:none; }
        .tab-panel.active{ display:block; }
        .monitor-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
        .stat-pill{ background:var(--card); border:0.5px solid var(--border); padding:15px; border-radius:20px; backdrop-filter:var(--glass); position:relative; overflow:hidden; }
        .stat-pill::before{ content:''; position:absolute; top:0; right:0; width:60px; height:60px; border-radius:0 20px 0 100%; opacity:0.1; }
        .stat-pill.blue::before{ background:var(--blue); }
        .stat-pill.green::before{ background:var(--green); }
        .stat-pill.orange::before{ background:var(--orange); }
        .stat-pill.red::before{ background:var(--accent); }
        .stat-label{ font-size:10px; color:#8e8e93; font-weight:700; text-transform:uppercase; display:flex; align-items:center; gap:6px; }
        .stat-value{ font-size:22px; font-weight:800; display:block; margin-top:6px; }
        .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
        .dot-online{ background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
        .dot-offline{ background:var(--accent); }
        .dot-suspended{ background:var(--orange); }
        @keyframes pulse{ 0%{opacity:1;} 50%{opacity:0.4;} 100%{opacity:1;} }
        .chart-card{ background:var(--card); border:0.5px solid var(--border); border-radius:20px; padding:18px; margin-bottom:20px; }
        .chart-title{ font-size:12px; font-weight:800; color:#8e8e93; text-transform:uppercase; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
        .user-card{ background:var(--card); border-radius:22px; padding:18px; margin-bottom:15px; border:0.5px solid var(--border); backdrop-filter:var(--glass); transition:0.3s; }
        .user-card:hover{ border-color:rgba(255,255,255,0.2); }
        .u-top{ display:flex; align-items:center; gap:15px; }
        .u-avatar{ width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#1c1c1e,#2c2c2e); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; flex-shrink:0; }
        .badge-row{ margin-top:8px; display:flex; gap:5px; flex-wrap:wrap; }
        .ios-badge{ font-size:9px; font-weight:800; padding:3px 8px; border-radius:6px; text-transform:uppercase; }
        .badge-limit{ background:rgba(0,122,255,0.1); color:var(--blue); }
        .badge-active{ background:rgba(52,199,89,0.1); color:var(--green); }
        .badge-banned{ background:rgba(255,59,48,0.1); color:var(--accent); }
        .badge-role{ background:rgba(175,82,222,0.1); color:var(--purple); }
        .actions{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:15px; border-top:0.5px solid var(--border); padding-top:15px; }
        .ios-btn{ background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; padding:10px 0; color:#fff; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:0.2s; font-family:inherit; }
        .ios-btn:hover{ background:rgba(255,255,255,0.1); transform:translateY(-1px); }
        .ios-btn span{ font-size:9px; font-weight:700; }
        .log-table{ width:100%; border-collapse:collapse; font-size:12px; }
        .log-table th{ text-align:left; color:#8e8e93; font-size:10px; font-weight:700; text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--border); }
        .log-table td{ padding:10px; border-bottom:0.5px solid rgba(255,255,255,0.05); vertical-align:top; }
        .log-type{ padding:2px 7px; border-radius:5px; font-size:9px; font-weight:800; }
        .log-login_fail{ background:rgba(255,59,48,0.15); color:#ff453a; }
        .log-login_success{ background:rgba(52,199,89,0.15); color:#30d158; }
        .log-admin_login,.log-admin_action{ background:rgba(175,82,222,0.15); color:#bf5af2; }
        .log-block_ip{ background:rgba(255,159,10,0.15); color:#ffa10a; }
        .ip-rule-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:8px; }
        .ip-rule-row .ip{ font-family:monospace; font-size:13px; }
        .search-box{ background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:#fff; font-size:13px; outline:none; width:100%; margin-bottom:15px; font-family:inherit; }
        .search-box::placeholder{ color:#555; }
        .btn-sm{ background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:10px; padding:7px 14px; color:#fff; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:0.2s; }
        .btn-sm:hover{ background:rgba(255,255,255,0.15); }
        .btn-sm.danger{ background:rgba(255,59,48,0.1); border-color:rgba(255,59,48,0.2); color:#ff453a; }
        .btn-sm.blue{ background:rgba(0,122,255,0.12); border-color:rgba(0,122,255,0.2); color:var(--blue); }
        .empty-state{ text-align:center; padding:40px 0; color:#555; }
        .skeleton{ background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
        @keyframes shimmer{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-logo">
        <i class="fas fa-user-shield" style="color:var(--purple)"></i>
        CLAUD Authority <span class="badge">ADMIN</span>
    </div>
    <div style="display:flex;gap:8px;">
        <button class="btn-sm blue" onclick="createUser()"><i class="fas fa-plus"></i> New User</button>
        <button class="btn-sm" onclick="location.href='/logout'"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</nav>

<div class="container">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('overview',this)"><i class="fas fa-chart-pie"></i> Overview</button>
        <button class="tab-btn" onclick="switchTab('users',this)"><i class="fas fa-users"></i> Users</button>
        <button class="tab-btn" onclick="switchTab('security',this)"><i class="fas fa-shield-alt"></i> Security</button>
        <button class="tab-btn" onclick="switchTab('announcement',this)"><i class="fas fa-bullhorn"></i> Announce</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div class="tab-panel active" id="tab-overview">
        <div class="monitor-grid">
            <div class="stat-pill blue"><div class="stat-label"><i class="fas fa-server"></i> Active Nodes</div><span class="stat-value"><span class="dot dot-online"></span> <span id="onlineCount">0</span></span></div>
            <div class="stat-pill green"><div class="stat-label"><i class="fas fa-layer-group"></i> Total Servers</div><span class="stat-value" id="totalSrvCount">0</span></div>
            <div class="stat-pill orange"><div class="stat-label"><i class="fas fa-ban"></i> Suspended Users</div><span class="stat-value"><span class="dot dot-suspended"></span> <span id="suspendedCount">0</span></span></div>
            <div class="stat-pill red"><div class="stat-label"><i class="fas fa-microchip"></i> CPU Usage</div><span class="stat-value" id="cpuVal">0%</span></div>
        </div>
        <div class="chart-card">
            <div class="chart-title"><span><i class="fas fa-chart-bar"></i> Server Status Distribution</span></div>
            <canvas id="srvChart" height="140"></canvas>
        </div>
        <div id="userList"></div>
    </div>

    <!-- USERS TAB -->
    <div class="tab-panel" id="tab-users">
        <input type="text" class="search-box" placeholder="🔍 Search users by name or email..." id="userSearch" oninput="filterUsers()">
        <div id="usersTab"></div>
    </div>

    <!-- SECURITY TAB -->
    <div class="tab-panel" id="tab-security">
        <div class="chart-card" style="margin-bottom:15px;">
            <div class="chart-title">
                <span><i class="fas fa-shield-alt"></i> IP Rules</span>
                <button class="btn-sm blue" onclick="addBlockIP()"><i class="fas fa-plus"></i> Block IP</button>
            </div>
            <div id="ipRulesList"><div class="empty-state"><i class="fas fa-check-circle" style="color:var(--green)"></i><br>No IP rules active</div></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">
                <span><i class="fas fa-list-alt"></i> Security Logs</span>
                <button class="btn-sm" onclick="loadSecurityLogs()"><i class="fas fa-sync"></i> Refresh</button>
            </div>
            <div style="overflow-x:auto;">
                <table class="log-table">
                    <thead><tr><th>Time</th><th>Event</th><th>IP</th><th>Details</th></tr></thead>
                    <tbody id="securityLogs"><tr><td colspan="4" class="empty-state">Click Refresh to load logs</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ANNOUNCEMENT TAB -->
    <div class="tab-panel" id="tab-announcement">
        <div class="chart-card">
            <div class="chart-title"><span><i class="fas fa-bullhorn"></i> Set Announcement Popup</span></div>
            <form id="popupForm" enctype="multipart/form-data" onsubmit="savePopup(event)" style="display:flex;flex-direction:column;gap:12px;">
                <input type="text" name="title" placeholder="Popup Title" class="search-box" style="margin:0;" required>
                <textarea name="msg" placeholder="Popup Message" class="search-box" style="margin:0;min-height:80px;resize:vertical;"></textarea>
                <input type="file" name="image" accept="image/*" class="btn-sm" style="cursor:pointer;">
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#ccc;">
                    <input type="checkbox" name="show_popup" value="true"> Show popup to users
                </label>
                <button type="submit" class="btn-sm blue" style="width:100%;padding:12px;">Save Announcement</button>
            </form>
        </div>
    </div>
</div>

<script>
let allUsers = [];
let srvChart;

function switchTab(name, el) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (el) el.classList.add('active');
    if (name === 'security') { loadSecurityLogs(); loadIPRules(); }
}

function renderUsers(users) {
    const renderList = (containerId) => {
        const list = document.getElementById(containerId);
        if (!users.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-ghost" style="font-size:32px;margin-bottom:10px;"></i><br>No users found</div>'; return; }
        list.innerHTML = users.map(u => {
            const limit = u.server_limit !== undefined ? u.server_limit : 1;
            return `<div class="user-card animate__animated animate__fadeIn">
                <div class="u-top">
                    <div class="u-avatar">${(u.fname||'?')[0].toUpperCase()}</div>
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${u.fname}</div>
                        <div style="font-size:11px;color:#8e8e93;margin-top:2px;">${u.email}</div>
                        <div class="badge-row">
                            <span class="ios-badge badge-limit">Limit: ${limit}</span>
                            <span class="ios-badge ${u.status==='active'?'badge-active':'badge-banned'}">${u.status}</span>
                            <span class="ios-badge badge-role">${u.role}</span>
                        </div>
                    </div>
                    <div style="text-align:right;font-size:11px;font-weight:700;flex-shrink:0;">
                        <div style="color:var(--green)">${u.active_srvs} ON</div>
                        <div style="color:#8e8e93">${u.srv_count} TOTAL</div>
                    </div>
                </div>
                <div class="actions">
                    <button class="ios-btn" onclick="editPermissions(${u.id},'${u.role}',${limit},'${u.status}')"><i class="fas fa-sliders"></i><span>Limit</span></button>
                    ${u.status==='active'?
                        `<button class="ios-btn" style="color:var(--accent)" onclick="toggleBan(${u.id},'banned')"><i class="fas fa-user-slash"></i><span>Ban</span></button>`:
                        `<button class="ios-btn" style="color:var(--green)" onclick="toggleBan(${u.id},'active')"><i class="fas fa-user-check"></i><span>Unban</span></button>`}
                    <button class="ios-btn" onclick="location.href='/admin/manage-user/${u.id}'"><i class="fas fa-server"></i><span>Manage</span></button>
                    <button class="ios-btn" style="color:var(--accent)" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i><span>Purge</span></button>
                </div>
            </div>`;
        }).join('');
    };
    renderList('userList');
    renderList('usersTab');
}

function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    const filtered = q ? allUsers.filter(u => (u.fname||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)) : allUsers;
    const list = document.getElementById('usersTab');
    list.innerHTML = '';
    if (!filtered.length) { list.innerHTML = '<div class="empty-state">No results</div>'; return; }
    filtered.forEach(u => {
        const limit = u.server_limit||1;
        list.innerHTML += `<div class="user-card animate__animated animate__fadeIn">
            <div class="u-top">
                <div class="u-avatar">${(u.fname||'?')[0].toUpperCase()}</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:800;font-size:15px;">${u.fname}</div>
                    <div style="font-size:11px;color:#8e8e93;">${u.email}</div>
                    <div class="badge-row"><span class="ios-badge badge-limit">Limit: ${limit}</span><span class="ios-badge ${u.status==='active'?'badge-active':'badge-banned'}">${u.status}</span></div>
                </div>
            </div>
            <div class="actions">
                <button class="ios-btn" onclick="editPermissions(${u.id},'${u.role}',${limit},'${u.status}')"><i class="fas fa-sliders"></i><span>Limit</span></button>
                ${u.status==='active'?`<button class="ios-btn" style="color:var(--accent)" onclick="toggleBan(${u.id},'banned')"><i class="fas fa-user-slash"></i><span>Ban</span></button>`:`<button class="ios-btn" style="color:var(--green)" onclick="toggleBan(${u.id},'active')"><i class="fas fa-user-check"></i><span>Unban</span></button>`}
                <button class="ios-btn" onclick="location.href='/admin/manage-user/${u.id}'"><i class="fas fa-server"></i><span>Manage</span></button>
                <button class="ios-btn" style="color:var(--accent)" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i><span>Purge</span></button>
            </div>
        </div>`;
    });
}

async function loadData() {
    try {
        const r = await fetch('/admin/stats');
        const d = await r.json();
        document.getElementById('cpuVal').innerText = d.sys_cpu||'0%';
        let totalSrv=0, onlineSrv=0, bannedUsers=0;
        allUsers = d.users||[];
        allUsers.forEach(u => { totalSrv+=u.srv_count; onlineSrv+=u.active_srvs; if(u.status==='banned') bannedUsers++; });
        document.getElementById('onlineCount').innerText = onlineSrv;
        document.getElementById('totalSrvCount').innerText = totalSrv;
        document.getElementById('suspendedCount').innerText = bannedUsers;
        renderUsers(allUsers);

        if (srvChart) {
            srvChart.data.datasets[0].data = [onlineSrv, totalSrv-onlineSrv, bannedUsers];
            srvChart.update();
        } else {
            const ctx = document.getElementById('srvChart').getContext('2d');
            srvChart = new Chart(ctx, { type:'bar', data:{
                labels:['Online','Offline','Banned Users'],
                datasets:[{data:[onlineSrv,totalSrv-onlineSrv,bannedUsers], backgroundColor:['rgba(52,199,89,0.6)','rgba(142,142,147,0.4)','rgba(255,59,48,0.6)'], borderRadius:8, borderWidth:0}]
            }, options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#888'}}, x:{grid:{display:false}, ticks:{color:'#888'}}}}});
        }
    } catch(e) { console.error(e); }
}

async function loadSecurityLogs() {
    const tbody = document.getElementById('securityLogs');
    tbody.innerHTML = '<tr><td colspan="4"><div class="skeleton" style="height:20px;margin:5px 0;"></div></td></tr>'.repeat(5);
    const r = await fetch('/admin/security/logs');
    const d = await r.json();
    if (!d.logs||!d.logs.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#555;padding:20px;">No logs yet</td></tr>'; return; }
    tbody.innerHTML = d.logs.map(l => `<tr>
        <td style="color:#555;font-size:11px;white-space:nowrap;">${l.created_at||''}</td>
        <td><span class="log-type log-${l.event_type||''}">${(l.event_type||'').replace(/_/g,' ')}</span></td>
        <td style="font-family:monospace;font-size:11px;">${l.ip_address||'-'}</td>
        <td style="color:#aaa;font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.details||'-'}</td>
    </tr>`).join('');
}

async function loadIPRules() {
    const r = await fetch('/admin/security/ip-rules');
    const d = await r.json();
    const list = document.getElementById('ipRulesList');
    if (!d.rules||!d.rules.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle" style="color:var(--green)"></i><br>No IP rules active</div>'; return; }
    list.innerHTML = d.rules.map(rule => `<div class="ip-rule-row">
        <div><div class="ip">${rule.ip_address}</div><div style="font-size:11px;color:#555;">${rule.reason||''}</div></div>
        <button class="btn-sm danger" onclick="unblockIP('${rule.ip_address}')"><i class="fas fa-unlock"></i> Unblock</button>
    </div>`).join('');
}

async function addBlockIP() {
    const {value:form} = await Swal.fire({
        title:'Block IP Address', background:'#1c1c1e', color:'#fff',
        html:`<input id="bi-ip" class="swal2-input" placeholder="IP Address (e.g. 1.2.3.4)">
              <input id="bi-reason" class="swal2-input" placeholder="Reason (optional)">`,
        preConfirm:()=>({ip:document.getElementById('bi-ip').value, reason:document.getElementById('bi-reason').value})
    });
    if(form && form.ip) {
        await fetch('/admin/security/block-ip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
        toast('IP Blocked','warning'); loadIPRules();
    }
}

async function unblockIP(ip) {
    await fetch('/admin/security/unblock-ip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});
    toast('IP Unblocked','success'); loadIPRules();
}

async function toggleBan(id, newStatus) {
    await fetch('/admin/user/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:id,status:newStatus,role:'free',limit:1})});
    loadData(); toast(newStatus==='banned'?'User Banned':'User Unbanned', newStatus==='banned'?'warning':'success');
}

async function editPermissions(id,role,limit,status) {
    const {value:form} = await Swal.fire({
        title:'Modify Permissions', background:'#1c1c1e', color:'#fff',
        html:`<input id="sw-limit" type="number" class="swal2-input" value="${limit}" min="1" placeholder="Server Limit" style="background:#2c2c2e;color:#fff;border-radius:10px;">
              <select id="sw-role" class="swal2-input" style="background:#2c2c2e;color:#fff;border-radius:10px;">
                <option value="free" ${role==='free'?'selected':''}>Free</option>
                <option value="premium" ${role==='premium'?'selected':''}>Premium</option>
                <option value="vip" ${role==='vip'?'selected':''}>VIP</option>
              </select>`,
        preConfirm:()=>({user_id:id,limit:document.getElementById('sw-limit').value,role:document.getElementById('sw-role').value,status})
    });
    if(form){ await fetch('/admin/user/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)}); loadData(); toast('Permissions Updated','success'); }
}

async function createUser() {
    const {value:v} = await Swal.fire({
        title:'Create New User', background:'#1c1c1e', color:'#fff',
        html:`<input id="n-name" class="swal2-input" placeholder="Full Name">
              <input id="n-email" class="swal2-input" placeholder="Email Address">
              <input id="n-pass" class="swal2-input" type="password" placeholder="Password">
              <input id="n-limit" type="number" class="swal2-input" placeholder="Server Limit" value="1">`,
        preConfirm:()=>({name:document.getElementById('n-name').value,email:document.getElementById('n-email').value,pass:document.getElementById('n-pass').value,limit:document.getElementById('n-limit').value})
    });
    if(v){ await fetch('/admin/create-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)}); loadData(); toast('User Created','success'); }
}

async function deleteUser(id) {
    const res = await Swal.fire({title:'Purge User?',text:'This permanently deletes all their servers and data.',icon:'error',showCancelButton:true,confirmButtonColor:'#ff3b30',background:'#1c1c1e',color:'#fff'});
    if(res.isConfirmed){ await fetch(`/admin/delete-user/${id}`,{method:'POST'}); loadData(); toast('User Deleted','info'); }
}

async function savePopup(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    fd.append('show', fd.has('show_popup') ? 'true' : 'false');
    await fetch('/admin/set-popup',{method:'POST',body:fd});
    toast('Announcement saved!','success');
}

function toast(msg,icon='success') {
    Swal.fire({toast:true,position:'top-end',timer:2200,title:msg,showConfirmButton:false,icon,background:'#1c1c1e',color:'#fff'});
}

setInterval(loadData, 6000);
loadData();
</script>
